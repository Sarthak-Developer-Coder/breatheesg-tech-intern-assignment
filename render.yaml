databases:
  - name: breatheesg-tech-intern-db
    plan: free

services:
  - name: breatheesg-tech-intern-backend
    type: web
    runtime: docker
    plan: free
    region: oregon
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    dockerCommand: >
      sh -c "set -e; python manage.py migrate --noinput; python manage.py seed_demo; python manage.py collectstatic --noinput; gunicorn config.wsgi:application --bind 0.0.0.0:${PORT:-8000} --workers 2"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: breatheesg-tech-intern-db
          property: connectionString
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      # Set this to your frontend URL, e.g. https://<frontend>.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false

  - name: breatheesg-tech-intern-frontend
    type: web
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    # This is a SPA; rewrite all routes to index.html for React Router.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Set this to your backend URL, e.g. https://<backend>.onrender.com
      - key: VITE_API_BASE_URL
        sync: false
