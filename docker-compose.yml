services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: carbon
      POSTGRES_USER: carbon
      POSTGRES_PASSWORD: carbon
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carbon -d carbon"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://carbon:carbon@db:5432/carbon
      DJANGO_DEBUG: "true"
      DJANGO_SECRET_KEY: dev-insecure-secret-key
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "set -e; python manage.py migrate --noinput; python manage.py seed_demo; gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2"

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
